name: LoopJob scan

on:
  schedule:
    # 08:00 / 14:00 / 20:00 IST == 02:30 / 08:30 / 14:30 UTC
    - cron: "30 2 * * *"
    - cron: "30 8 * * *"
    - cron: "30 14 * * *"
  workflow_dispatch: {}

concurrency:
  group: loopjob-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Cache embedding model & browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/ms-playwright
          key: loopjob-models-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Migrate database (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head && python -m app.db.seed

      - name: Run scan → match → email digest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          LOOPJOB_ENV: prod
        run: |
          python -c "
          import asyncio
          from app.features.scans.orchestrator import run_scan
          asyncio.run(run_scan(trigger='scheduled'))
          "
