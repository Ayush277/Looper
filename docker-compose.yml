# Full LoopJob stack. Requires Docker Desktop.
# Local no-Docker dev also works: `make dev-api` + `make dev-frontend` (SQLite).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: loopjob
      POSTGRES_PASSWORD: loopjob
      POSTGRES_DB: loopjob
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loopjob"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  api:
    build: { context: ./backend }
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://loopjob:loopjob@postgres:5432/loopjob
      REDIS_URL: redis://redis:6379/0
    env_file: [.env]
    ports: ["8000:8000"]
    volumes: [./backend:/code]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  # worker + scheduler services land with M4 (Celery/APScheduler)

  frontend:
    build: { context: ./frontend }
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports: ["3000:3000"]
    depends_on: [api]
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
